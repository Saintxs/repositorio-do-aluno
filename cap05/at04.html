<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 - AT04 - Inscrição em Evento</title>
</head>
<body>

    <header>
        <h1>AT04 - Inscrição em Evento (Campos Avançados)</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>

    <main>
        <p><strong>* Campos obrigatórios</strong></p>

        <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">
            
            <input type="hidden" name="edicao" value="2026" />

            <fieldset>
                <legend>Identificação do Participante</legend>
                
                <div>
                    <label for="nome">Nome completo: *</label>
                    <input type="text" id="nome" name="nome" required aria-required="true" autocomplete="name" />
                </div>

                <br />

                <div>
                    <label for="email">E-mail institucional: *</label>
                    <input type="email" id="email" name="email" required aria-required="true" autocomplete="email" />
                </div>

                <br />

                <div>
                    <label for="cidade">Cidade de origem:</label>
                    <input type="text" id="cidade" name="cidade" list="cidades-alagoas" />
                    
                    <datalist id="cidades-alagoas">
                        <option value="Maceió"></option>
                        <option value="Arapiraca"></option>
                        <option value="Palmeira dos Índios"></option>
                        <option value="Rio Largo"></option>
                        <option value="Penedo"></option>
                        <option value="União dos Palmares"></option>
                        <option value="Santana do Ipanema"></option>
                        <option value="Delmiro Gouveia"></option>
                    </datalist>
                </div>

                <br />

                <div>
                    <label for="foto">Foto para crachá:</label>
                    <input type="file" id="foto" name="foto" accept="image/jpeg, image/png" aria-describedby="instrucao-foto" />
                    <br />
                    <small id="instrucao-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
                </div>
            </fieldset>

            <br />

            <fieldset>
                <legend>Preferências para o Evento</legend>

                <div>
                    <label for="chegada">Data e hora preferida para chegada:</label>
                    <input type="datetime-local" id="chegada" name="chegada" />
                </div>

                <br />

                <div>
                    <label for="experiencia">
                        Nível de experiência em programação: <span id="valor-experiencia">5</span>/10
                    </label>
                    <br />
                    <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" oninput="document.getElementById('valor-experiencia').textContent = this.value" />
                </div>

                <br />

                <div>
                    <label for="cor_camiseta">Cor de preferência para a camiseta:</label>
                    <br />
                    <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8" />
                </div>

                <br />

                <div>
                    <label for="oficinas">Oficinas de interesse:</label>
                    <br />
                    <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="instrucao-oficinas">
                        <option value="html_avancado">HTML5 Avançado e Acessibilidade</option>
                        <option value="css_flexbox_grid">Estilização com Flexbox e Grid</option>
                        <option value="javascript_logica">Lógica de Programação com JS</option>
                        <option value="git_github">Controle de Versão com Git e GitHub</option>
                        <option value="banco_dados_sql">Modelagem de Dados e SQL</option>
                    </select>
                    <br />
                    <small id="instrucao-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
                </div>
            </fieldset>

            <br />

            <div>
                <button type="submit">Confirmar inscrição</button>
            </div>

        </form>
    </main>

</body>
</html>
