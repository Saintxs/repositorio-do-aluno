<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 - AT03 - Formulário de Matrícula Acadêmica</title>
</head>
<body>

    <header>
        <h1>AT03 - Formulário de Matrícula Acadêmica</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>

    <main>
        <p><strong>* Campos obrigatórios</strong></p>

        <form action="https://httpbin.org/post" method="post">
            
            <fieldset>
                <legend>Dados Pessoais</legend>
                
                <div>
                    <label for="nome">Nome completo: *</label>
                    <input type="text" id="nome" name="nome" minlength="5" maxlength="100" required aria-required="true" autocomplete="name" />
                </div>

                <br />

                <div>
                    <label for="cpf">CPF: *</label>
                    <input type="text" id="cpf" name="cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00" required aria-required="true" />
                </div>

                <br />

                <div>
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999" />
                </div>

                <br />

                <div>
                    <label for="email">E-mail: *</label>
                    <input type="email" id="email" name="email" required aria-required="true" autocomplete="email" />
                </div>
            </fieldset>

            <br />

            <fieldset>
                <legend>Dados Acadêmicos</legend>
                
                <div>
                    <label for="curso">Curso pretendido: *</label>
                    <select id="curso" name="curso" required aria-required="true">
                        <option value="">-- Selecione um curso --</option>
                        <optgroup label="Computação">
                            <option value="sistemas_de_informacao">Sistemas de Informação</option>
                            <option value="ciencia_da_computacao">Ciência da Computação</option>
                            <option value="engenharia_da_computacao">Engenharia da Computação</option>
                        </optgroup>
                        <optgroup label="Gestão">
                            <option value="administracao">Administração</option>
                            <option value="ciencias_contabeis">Ciências Contábeis</option>
                        </optgroup>
                    </select>
                </div>

                <br />

                <fieldset>
                    <legend>Período: *</legend>
                    <div>
                        <input type="radio" id="manha" name="periodo" value="manha" required aria-required="true" />
                        <label for="manha">Manhã</label>
                    </div>
                    <div>
                        <input type="radio" id="tarde" name="periodo" value="tarde" />
                        <label for="tarde">Tarde</label>
                    </div>
                    <div>
                        <input type="radio" id="noite" name="periodo" value="noite" />
                        <label for="noite">Noite</label>
                    </div>
                </fieldset>

                <br />

                <div>
                    <label for="ano_ingresso">Ano de ingresso pretendido: *</label>
                    <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required aria-required="true" />
                </div>
            </fieldset>

            <br />

            <fieldset>
                <legend>Áreas de Interesse</legend>
                <p>Selecione uma ou mais áreas que despertam seu interesse:</p>
                
                <div>
                    <input type="checkbox" id="web" name="interesses[]" value="desenvolvimento_web" />
                    <label for="web">Desenvolvimento Web</label>
                </div>
                <div>
                    <input type="checkbox" id="bd" name="interesses[]" value="banco_de_dados" />
                    <label for="bd">Banco de Dados</label>
                </div>
                <div>
                    <input type="checkbox" id="ia" name="interesses[]" value="inteligencia_artificial" />
                    <label for="ia">Inteligência Artificial</label>
                </div>
                <div>
                    <input type="checkbox" id="seguranca" name="interesses[]" value="seguranca_da_informacao" />
                    <label for="seguranca">Segurança da Informação</label>
                </div>
                <div>
                    <input type="checkbox" id="infra" name="interesses[]" value="infraestrutura" />
                    <label for="infra">Infraestrutura</label>
                </div>
            </fieldset>

            <br />

            <div>
                <button type="submit">Solicitar matrícula</button>
                <button type="reset">Limpar formulário</button>
            </div>

        </form>
    </main>

</body>
</html>
